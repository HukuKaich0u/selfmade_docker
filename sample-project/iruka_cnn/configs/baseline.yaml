experiment:
  name: baseline
  seed: 42
  output_dir: artifacts

dictionary:
  phrases_path: data/phrases.yaml

audio:
  sample_rate: 24000
  clip_seconds: 2.5
  min_phrase_seconds: 1.0
  max_phrase_seconds: 2.5
  silence_threshold_dbfs: -48.0

features:
  n_fft: 1024
  hop_length: 256
  n_mels: 64
  f_min: 300
  f_max: 12000
  top_db: 80.0

dataset:
  train_per_phrase: 320
  val_per_phrase: 64
  test_per_phrase: 64
  unknown_per_split: 320
  silence_per_split: 160
  overwrite: false
  cache_features: true
  cache_dtype: float16

training:
  batch_size: 32
  epochs: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  embedding_dim: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 4
  device: auto
  class_weighting: true
  save_best_only: true

inference:
  confidence_threshold: 0.72
  margin_threshold: 0.12
  top_k: 5

streaming:
  segment_gap_ms: 300
  frame_ms: 20
  start_ms: 60
  end_ms: 240
  provisional_interval_ms: 150
  min_provisional_ms: 700
  stability_count: 3
  min_segment_ms: 300
  max_segment_seconds: 2.8

evaluation:
  condition: clean
  render_confusion_matrix: true

augmentation:
  enable: true
  mode: feature
  gain_db: 4.0
  speed_range: [0.96, 1.04]
  pitch_semitones: 0.7
  reverb_decay: 0.18
  noise_snr_db: [18.0, 32.0]
  eq_strength_db: 3.0
  silence_jitter_ms: 90
  feature_gain_db: 1.5
  feature_noise_std: 0.025
  feature_time_shift_frames: 12
  feature_time_mask_max_frames: 18
  feature_freq_mask_max_bins: 6
  feature_mel_shift_max_bins: 2
